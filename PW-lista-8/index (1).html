<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Css/style.css">
    <title>BrandBuzz</title>
    

   <!-- Font Awesome 7.1 -->
    <script src="https://kit.fontawesome.com/fefb92cf2c.js" crossorigin="anonymous"></script>
    
</head>
<body>

    <header>
        <div class="logo">
            <img src="/assets/imagens/logo.png" alt="Logo">
        </div>

        <nav>
            <ul>
                <li><a class="active" href="#">Home</a></li>
                <li><a href="#">About us</a></li>
                <li><a href="#">Service</a></li>
                <li><a href="#">Contact us</a></li>
                <li><a href="#">Blog</a></li>
            </ul>
        </nav>

        <a href="#" class="btn-sign">Sign Up</a>
    </header>

    <main>
        <section class="hero">

            <div class="hero-content">

                <h1>
                    We create
                    <span>solutions</span>
                    for your business
                </h1>

                <p>
                    Our team keeps a keen eye on emerging trends
                    and technologies to ensure your marketing
                    campaigns remain cutting-edge.
                </p>

                <a href="#" class="btn-primary">
                    Get Started
                </a>

                <div class="explore">
                    <a href="#">
                        <i class="fa-solid fa-chevron-down"></i>
                    </a>

                    <span>Explore more</span>
                </div>

            </div>

            <div class="hero-image">
                <img src="/assets/imagens/banner.png" alt="Banner">
            </div>

        </section>
    </main>

</body>
</html>
